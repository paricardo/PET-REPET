<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../static/css/style.css">
    <title>Home</title>
</head>
<body>
    <main class="container">
        <div class="px-1 mt-2 mb-0 d-flex justify-content-between align-items-center" id="header">
            <div>
                <h1 class="mt-2 mb-0 fs-2">Olá, Paulo!</h1>
                <p>Administrador</p>
            </div>
            <div class="d-flex align-items-center gap-2">
                <img class="icons-header-w" src="../static/icons/bell.png" alt="icon-notification">
                <img class="wl-1 img-header-w" src="../static/icons/usuario.png" alt="img-users">
            </div>
        </div>

        <hr class="mt-0">

        <div class="grid-info">
            <h2 class="fs-6">Resumo do dia</h2>
            <div>
                <div class="container text-center">
                    <div class="row row-cols-2 gx-4 gy-2">

                        <div class="card-grid-status col p-4 border rounded-3">

                            <div class="bg-red m-0 p-0">
                                <img class="icons" src="../static/images/dog.png" alt="">
                            </div>
                            
                            <div class="d-flex flex-column align-items-start m-0 p-0">
                                <p>Finalizados</p>
                                <p class="text-count">12</p>
                            </div>

                        </div>

                        <div class="card-grid-status col p-4 border rounded-3">

                            <div class="bg-red m-0 p-0">
                                <img class="icons" src="../static/images/dog_rotas.png" alt="">
                            </div>
                            
                            <div class="d-flex flex-column align-items-start m-0 p-0">
                                <p>Agendados</p>
                                <p class="text-count">20</p>
                            </div>

                        </div>

                    </div>
                </div>
            </div>
        </div>

        <br>

        <div>
            <div class="d-flex justify-content-between align-items-start p-1">
                <h2 class="fs-6">Atendimentos do Dia!</h2>
                <a class="text-decoration-none" href="#">Ver todos</a>
            </div>


            <div class="card-list">
                <div class="card-time">
                    <h3 class="fs-6">10:00</h3>
                </div>

                <div class="card-list-img">
                    <img class="img-pet" src="../static/icons/foto.png" alt="photo-pet">
                </div>

                <div class="card-list-info">
                    <h4>Carlos Silva</h4>
                    <p>Boby</p>
                </div>

                <div class="card-list-status">
                    <p class="p-service">Banho</p>
                    <p class="status-green p-status">Finalizado</p>
                </div>

            </div>
        </div>

    </main>

    <nav class="navbar d-block d-md-none fixed-bottom bg-body-tertiary border-top">
        <div class="container-fluid">
            
            <span class="d-flex flex-column align-items-center">
                <img src="../static/icons/home.svg" alt="home">
                <a class="text-nav navbar-brand m-0" href="#">Home</a>
            </span>

            <span class="d-flex flex-column align-items-center">
                <img src="../static/icons/group.svg" alt="home">
                <a class="text-nav navbar-brand m-0" href="#">Clientes</a>
            </span>

            <span class="d-flex flex-column align-items-center">
                <img src="../static/icons/calendar.svg" alt="home">
                <a class="text-nav navbar-brand m-0" href="#">Atendimentos</a>
            </span>

            <span class="d-flex flex-column align-items-center">
                <img src="../static/icons/money.svg" alt="home">
                <a class="text-nav navbar-brand m-0" href="#">Financeiro</a>
            </span>


            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarScroll" aria-controls="navbarScroll" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarScroll">

                <span class="d-flex align-items-center">
                    <img src="../static/icons/person.svg" alt="home">
                    <a class="text-nav navbar-brand m-0 p-2 fs-5" href="#">Usuários</a>
                </span>
           
            </div>
        </div>
    </nav>

    <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
