<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS do projeto -->
    <link rel="stylesheet" href="../static/css/style.css">

    <title>Login</title>
</head>
<body class="bg-light">

<main class="container d-flex justify-content-center align-items-center" style="min-height:100vh;">

    <div class="bg-white rounded shadow-sm p-4 w-100" style="max-width:400px;">

        <div class="text-center mb-4">
            <div class="display-4 mb-3">🐶</div>

            <h2 class="text-primary fw-bold mb-1">
                PET-REPET
            </h2>

            <p class="text-muted mb-0">
                Sistema de Gestão para Petshops
            </p>
        </div>

        <form class="add-service-form d-flex flex-column gap-3">

            <div>
                <label for="email">E-mail</label>
                <input
                    id="email"
                    type="email"
                    placeholder="exemplo@email.com">
            </div>

            <div>
                <label for="password">Senha</label>
                <input
                    id="password"
                    type="password"
                    placeholder="Digite sua senha">
            </div>

            <div class="d-flex justify-content-between align-items-center">

                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remember">

                    <label class="form-check-label" for="remember">
                        Lembrar-me
                    </label>
                </div>

                <a href="#" class="text-decoration-none small">
                    Esqueci minha senha
                </a>

            </div>

            <button class="btn btn-primary w-100">
                Entrar
            </button>

        </form>

    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
