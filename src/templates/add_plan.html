<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap via CDN para funcionar no Live Server -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS do projeto -->
    <link rel="stylesheet" href="../static/css/style.css">

    <title>Novo Plano</title>
</head>
<body>
    
<header class="header-blue-add">
    <div class="bg-primary d-flex align-items-center pt-4 pb-3 px-3">

        <button class="bg-primary border-0">
            <img src="../static/icons/arrow_back_white.svg" alt="Voltar">
        </button>

        <h1 class="fs-5 text-white m-0 ms-5 pt-2">
            Novo Plano
        </h1>

    </div>
</header>

    <main class="container d-flex flex-column" style="min-height: calc(100vh - 80px);">
        <form class="add-service-form d-flex flex-column gap-3 pt-3 flex-grow-1" action="#">

            <label for="planName">Nome do Plano</label>
            <input id="planName" type="text" name="planName" placeholder="Ex: Plano Ouro">

            <label for="planDescription">Descrição</label>
            <textarea id="planDescription" name="planDescription" placeholder="Descreva o plano"></textarea>

            <label for="planServices">Serviços Inclusos</label>
            <button 
                id="planServices"
                type="button"
                class="plan-services-button d-flex justify-content-between align-items-center"
            >
                <span>Selecione os serviços</span>
                <span class="fs-4">›</span>
            </button>

            <label for="planDuration">Duração (dias)</label>
            <input id="planDuration" type="number" name="planDuration" placeholder="Ex: 30">

            <label for="servicePrice">Preço</label>
            <input id="servicePrice" type="number" name="servicePrice" placeholder="R$ 0,00">

            <label for="planBenefits">Benefícios</label>

            <button
                id="planBenefits"
                type="button"
                class="plan-services-button d-flex justify-content-between align-items-center">
                <span>Adicionar benefício</span>
                <span class="fs-4">+</span>
            </button>

            <div class="d-flex justify-content-between align-items-center mt-3">
                <label class="form-check-label fw-bold" for="serviceActive">Plano Ativo</label>

                <div class="form-check form-switch m-0">
                    <input class="form-check-input" type="checkbox" role="switch" id="serviceActive" name="serviceActive" checked>
                </div>
            </div>

            <div class="mt-auto pb-3">
                <button type="submit" class="btn btn-primary w-100">Salvar</button>
            </div>

        </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
