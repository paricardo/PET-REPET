<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS do projeto -->
    <link rel="stylesheet" href="../static/css/style.css">

    <title>Detalhe Atendimento</title>
</head>
<body>

<header class="header-blue-add">
    <div class="bg-primary d-flex align-items-center pt-4 pb-3 px-3">

        <button class="bg-primary border-0">
            <img src="../static/icons/arrow_back_white.svg" alt="Voltar">
        </button>

        <h1 class="fs-5 text-white m-0 ms-5 pt-2">
            Detalhe Atendimento
        </h1>

    </div>
</header>

<main class="container py-3">

    <div class="add-service-form p-3">

        <h2 class="fs-6 fw-bold mb-3">
            Informações do Atendimento
        </h2>

        <div class="mb-3">
            <small class="text-muted">Cliente</small>
            <p class="mb-0 fw-semibold">Carlos Silva</p>
        </div>

        <div class="mb-3">
            <small class="text-muted">Telefone</small>
            <p class="mb-0">(11) 99999-9999</p>
        </div>

        <div class="mb-3">
            <small class="text-muted">Pet</small>
            <p class="mb-0">Buddy (Golden Retriever)</p>
        </div>

        <div class="mb-3">
            <small class="text-muted">Serviço</small>
            <p class="mb-0">Banho e Tosa</p>
        </div>

        <div class="mb-3">
            <small class="text-muted">Responsável</small>
            <p class="mb-0">Paulo Administrador</p>
        </div>

        <div class="mb-3">
            <small class="text-muted">Data</small>
            <p class="mb-0">20/06/2026</p>
        </div>

        <div class="mb-3">
            <small class="text-muted">Horário</small>
            <p class="mb-0">14:30</p>
        </div>

        <div class="mb-3">
            <small class="text-muted">Status</small>
            <p class="mb-0">
                <span class="badge bg-success">
                    Agendado
                </span>
            </p>
        </div>

        <div class="mb-4">
            <small class="text-muted">Observações</small>
            <p class="mb-0">
                Pet dócil. Atenção na região das orelhas.
            </p>
        </div>

        <div class="d-grid gap-2">
            <button class="btn btn-outline-primary">
                Imprimir Ficha
            </button>

            <button class="btn btn-primary">
                Voltar
            </button>
        </div>

    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
