<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap via CDN para funcionar no Live Server -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS do projeto -->
    <link rel="stylesheet" href="../static/css/style.css">

    <title>Novo Serviço</title>
</head>
<body>
    
<header class="header-blue-add">
    <div class="bg-primary d-flex align-items-center pt-4 pb-3 px-3">

        <button class="bg-primary border-0">
            <img src="../static/icons/arrow_back_white.svg" alt="Voltar">
        </button>

        <h1 class="fs-5 text-white m-0 ms-5 pt-2">
            Novo Serviço
        </h1>

    </div>
</header>

    <main class="container d-flex flex-column" style="min-height: calc(100vh - 80px);">
        <form class="add-service-form d-flex flex-column gap-2 pt-3 flex-grow-1" action="#">

            <label for="serviceName">Nome do Serviço</label>
            <input id="serviceName" type="text" name="serviceName" placeholder="Ex: Banho">

            <label for="serviceDescription">Descrição</label>
            <textarea id="serviceDescription" name="serviceDescription" placeholder="Descreva o serviço"></textarea>

            <label for="serviceCategory">Categoria</label>
            <select id="serviceCategory" name="serviceCategory">
                <option selected disabled>Selecione a categoria</option>
                <option value="banho">Banho</option>
                <option value="tosa">Tosa</option>
                <option value="hidratacao">Hidratação</option>
                <option value="consulta">Consulta</option>
            </select>

            <label for="serviceDuration">Duração média</label>
            <div class="d-flex gap-2">
                <input id="serviceDuration" class="w-100" type="number" name="serviceDuration" placeholder="Ex: 60">
                <span class="d-flex align-items-center px-2 border rounded bg-white">minutos</span>
            </div>

            <label for="servicePrice">Preço</label>
            <input id="servicePrice" type="number" name="servicePrice" placeholder="R$ 0,00">

            <div class="d-flex justify-content-between align-items-center mt-3">
                <label class="form-check-label fw-bold" for="serviceActive">Ativo</label>

                <div class="form-check form-switch m-0">
                    <input class="form-check-input" type="checkbox" role="switch" id="serviceActive" name="serviceActive" checked>
                </div>
            </div>

            <div class="mt-auto pb-3">
                <button type="submit" class="btn btn-primary w-100">Salvar</button>
            </div>

        </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
