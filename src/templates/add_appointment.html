<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap via CDN para funcionar no Live Server -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS do projeto -->
    <link rel="stylesheet" href="../static/css/style.css">

    <title>Novo Atendimento</title>
</head>
<body>
    
<header class="header-blue-add">
    <div class="bg-primary d-flex align-items-center pt-4 pb-3 px-3">

        <button class="bg-primary border-0">
            <img src="../static/icons/arrow_back_white.svg" alt="Voltar">
        </button>

        <h1 class="fs-5 text-white m-0 ms-5 pt-2">
            Novo Atendimento
        </h1>

    </div>
</header>

<main class="container d-flex flex-column" style="min-height: calc(100vh - 80px);">
    <form class="add-service-form d-flex flex-column gap-3 pt-3 flex-grow-1" action="#">

        <h2 class="fs-6 fw-bold mt-2">Informações básicas</h2>

        <label for="appointmentCustomer">Cliente</label>
        <select id="appointmentCustomer" name="customer_id">
            <option selected disabled>Selecione o cliente</option>
            <option value="1">Carlos Silva</option>
        </select>

        <label for="appointmentPet">Pet</label>
        <select id="appointmentPet" name="pet_id">
            <option selected disabled>Selecione o pet</option>
            <option value="1">Buddy (Golden Retriever)</option>
        </select>

        <label for="appointmentService">Serviço</label>
        <select id="appointmentService" name="service_id">
            <option selected disabled>Selecione o serviço</option>
            <option value="1">Banho</option>
            <option value="2">Tosa</option>
            <option value="3">Hidratação</option>
        </select>

        <label for="appointmentUser">Responsável</label>
        <select id="appointmentUser" name="user_id">
            <option selected disabled>Selecione o responsável</option>
            <option value="1">Paulo Administrador</option>
        </select>

        <label for="appointmentDate">Data</label>
        <input id="appointmentDate" type="date" name="appointmentDate">

        <label for="appointmentTime">Hora</label>
        <input id="appointmentTime" type="time" name="appointmentTime">

        <h2 class="fs-6 fw-bold mt-3">Cobrança</h2>

        <label for="billingOrigin">Origem da cobrança</label>
        <select id="billingOrigin" name="billing_origin">
            <option selected disabled>Selecione a origem</option>
            <option value="ONE_TIME">Avulso</option>
            <option value="PLAN">Plano</option>
        </select>

        <label for="customerPlan">Plano do cliente</label>
        <select id="customerPlan" name="customer_plan_id">
            <option selected disabled>Selecione o plano, se houver</option>
            <option value="">Sem plano</option>
            <option value="1">Plano Ouro</option>
        </select>

        <label for="finalPrice">Valor final</label>
        <input id="finalPrice" type="number" name="final_price" placeholder="R$ 0,00">

        <label for="appointmentStatus">Status</label>
        <select id="appointmentStatus" name="status">
            <option value="SCHEDULED" selected>Agendado</option>
            <option value="COMPLETED">Concluído</option>
            <option value="CANCELED">Cancelado</option>
        </select>

        <h2 class="fs-6 fw-bold mt-3">Observações</h2>

        <label for="appointmentNotes">Observações do atendimento</label>
        <textarea id="appointmentNotes" name="notes" placeholder="Adicione observações sobre o atendimento"></textarea>

        <div class="mt-auto pb-3">
            <button type="submit" class="btn btn-primary w-100">Salvar Atendimento</button>
        </div>

    </form>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
