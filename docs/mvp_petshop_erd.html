
<div id="erd" style="padding: 1rem 0"></div>
<style>
#erd svg { width: 100%; }
</style>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2a27' : '#f1efe8',
    primaryBorderColor: dark ? '#4a4a45' : '#b4b2a9',
    primaryTextColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});

const diagram = `erDiagram
  users {
    uuid id PK
    string name
    string email
    string password_hash
    enum role
    boolean is_active
    datetime created_at
  }

  customers {
    uuid id PK
    string name
    string phone
    string email
    text notes
    boolean is_active
    datetime created_at
  }

  pets {
    uuid id PK
    uuid customer_id FK
    string name
    string breed
    enum size
    text notes
    boolean is_active
    datetime created_at
  }

  services {
    uuid id PK
    string name
    text description
    decimal price_small
    decimal price_medium
    decimal price_large
    boolean is_active
    datetime created_at
  }

  plans {
    uuid id PK
    string name
    text description
    decimal price
    integer duration_days
    text services_info
    boolean is_active
    datetime created_at
  }

  customer_plans {
    uuid id PK
    uuid customer_id FK
    uuid plan_id FK
    datetime started_at
    datetime expires_at
    decimal price_paid
    enum status
    datetime created_at
  }

  appointments {
    uuid id PK
    uuid customer_id FK
    uuid pet_id FK
    uuid service_id FK
    uuid user_id FK
    uuid customer_plan_id FK
    datetime scheduled_at
    enum billing_origin
    decimal final_price
    enum status
    text notes
    datetime created_at
  }

  customers ||--o{ pets : "tem"
  customers ||--o{ customer_plans : "contrata"
  customers ||--o{ appointments : "realiza"
  plans ||--o{ customer_plans : "gera"
  pets ||--o{ appointments : "atendido em"
  services ||--o{ appointments : "executado em"
  users ||--o{ appointments : "registra"
  customer_plans ||--o{ appointments : "cobre"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
